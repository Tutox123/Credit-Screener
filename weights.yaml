# Credit RV Screener - Scoring Weights Configuration
# All weights are centralized here for full reproducibility.
# To adjust the methodology, modify this file and re-run scoring_engine.py.

risk_score:
  # Bloc A: Idiosyncratic Risk (65%)
  idiosyncratic:
    total: 0.65
    components:
      bond_rating: 0.28      # S&P bond-level rating
      subordination: 0.20    # Seniority in capital structure
      leverage: 0.12         # ND/EBITDA (corp) | CET1 (banks) | Solvency II (insurance)
      duration: 0.05         # Modified duration

  # Bloc B: Sector Risk (18%)
  sector_risk:
    total: 0.18
    components:
      cyclicality: 0.07      # Defensive vs cyclical
      default_history: 0.06  # Historical sector default rate (Moody's)
      spread_volatility: 0.05  # 5Y vol of sector spreads

  # Bloc C: Macro / Exogenous Risk (17%)
  macro_risk:
    total: 0.17
    components:
      geopolitical: 0.06     # Geo exposure (sanctions, conflicts)
      rates_sensitivity: 0.05  # +100bp shock impact
      fx_exposure: 0.03      # Currency mismatch
      regulatory: 0.03       # Regulatory pressure intensity

reward_score:
  # Bloc A: Spread Attractiveness (62%)
  spread_attractiveness:
    total: 0.62
    components:
      z_spread_vs_universe: 0.30   # Percentile vs entire universe
      spread_vs_sector: 0.20       # Pickup vs sector median
      spread_vs_rating: 0.12       # Pickup vs same-rating median

  # Bloc B: Carry & Roll (18%)
  carry_and_roll:
    total: 0.18
    components:
      running_yield: 0.11
      roll_down_1y: 0.07

  # Bloc C: Sector Growth & Momentum (20%)
  sector_growth_momentum:
    total: 0.20
    components:
      growth_outlook: 0.10        # Forward growth prospects
      earnings_revision: 0.07     # Consensus revisions 3M
      spread_momentum_3m: 0.03    # Spread trajectory 3M

# ============================================================
# Static reference tables - editable for re-calibration
# ============================================================

